<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZF Hora Extra</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

.header {
    background: #0057B8;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.tabs {
    display: flex;
    background: white;
}

.tabs button {
    flex: 1;
    padding: 12px;
    border: none;
    background: #ddd;
    font-weight: bold;
}

.tabs button.active {
    background: #0057B8;
    color: white;
}

.container {
    padding: 20px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #0057B8;
    color: white;
    border: none;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">ZF Hora Extra</div>

<div class="tabs">
    <button class="active" onclick="trocarTela('hora')">Hora Extra</button>
    <button onclick="trocarTela('cadastro')">Cadastro</button>
</div>

<div class="container">

<!-- TELA HORA EXTRA -->
<div id="hora">

<div class="card">
<input type="text" id="cracha" placeholder="Crachá">
<button onclick="buscar()">Buscar</button>

<p id="nome"></p>

<input type="text" id="lider" placeholder="Nome do líder">
<input type="text" id="motivo" placeholder="Motivo">

<button onclick="enviar()">Confirmar Hora Extra</button>
</div>

</div>

<!-- TELA CADASTRO -->
<div id="cadastro" style="display:none;">

<div class="card">
<input type="text" id="nomeCad" placeholder="Nome">
<input type="text" id="crachaCad" placeholder="Crachá">
<input type="text" id="enderecoCad" placeholder="Endereço">
<input type="text" id="setorCad" placeholder="Setor">
<input type="text" id="turnoCad" placeholder="Turno">

<button onclick="cadastrar()">Cadastrar Funcionário</button>
</div>

</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzt1F9ybfU4YP3ZjvXOPQ_pycYVf8HAEjhsZ1ME68d-o5cjThJIUr8ydAZJVaL2jgg/exec";

let nomeColaborador = "";

// TROCAR TELA
function trocarTela(tela) {
    document.getElementById("hora").style.display = tela === "hora" ? "block" : "none";
    document.getElementById("cadastro").style.display = tela === "cadastro" ? "block" : "none";
}

// BUSCAR
function buscar() {
    let cracha = document.getElementById("cracha").value;

    fetch(URL + "?cracha=" + cracha)
    .then(res => res.json())
    .then(data => {
        nomeColaborador = data.nome;
        document.getElementById("nome").innerText = "👤 " + nomeColaborador;
    })
    .catch(() => {
        document.getElementById("nome").innerText = "❌ Não encontrado";
    });
}

// ENVIAR HORA EXTRA
function enviar() {
    fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            tipo: "hora_extra",
            cracha: document.getElementById("cracha").value,
            nome: nomeColaborador,
            lider: document.getElementById("lider").value,
            motivo: document.getElementById("motivo").value
        })
    })
    .then(() => alert("✅ Hora extra enviada"))
    .catch(() => alert("❌ Erro"));
}

// CADASTRAR FUNCIONÁRIO
function cadastrar() {
    fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            tipo: "cadastro",
            nome: document.getElementById("nomeCad").value,
            cracha: document.getElementById("crachaCad").value,
            endereco: document.getElementById("enderecoCad").value,
            setor: document.getElementById("setorCad").value,
            turno: document.getElementById("turnoCad").value
        })
    })
    .then(() => alert("✅ Funcionário cadastrado"))
    .catch(() => alert("❌ Erro"));
}

</script>

</body>
</html>
