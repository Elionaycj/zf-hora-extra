<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZF Hora Extra</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

.header {
    background: #0057B8;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.tabs {
    display: flex;
    background: white;
}

.tabs button {
    flex: 1;
    padding: 12px;
    border: none;
    background: #ddd;
    font-weight: bold;
}

.tabs button.active {
    background: #0057B8;
    color: white;
}

.container {
    padding: 20px;
}

input, button, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

.row {
    display: flex;
    gap: 10px;
}

.row > * {
    flex: 1;
}

button {
    background: #0057B8;
    color: white;
    border: none;
    transition: transform 0.1s ease, background 0.2s ease;
    cursor: pointer;
}

button:active {
    transform: scale(0.96);
    background: #004494;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
}

.operator-item {
    display: flex;
    align-items: flex-start;
    background: #f9f9f9;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid #eee;
    transition: all 0.3s ease;
    border-left: 5px solid #ccc;
}

.operator-item.selected {
    background: #e7f3ff;
    border-left: 5px solid #0057B8;
    transform: translateX(5px);
}

.operator-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin-right: 12px;
    margin-top: 2px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.operator-item input[type="checkbox"]:checked {
    transform: scale(1.2);
}

.operator-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.operator-info span {
    font-size: 14px;
    font-weight: bold;
    color: #333;
}

.operator-info small {
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="header">ZF Hora Extra</div>

<div class="tabs">
    <button id="btn-hora" class="active" onclick="trocarTela('hora')">Hora Extra</button>
    <button id="btn-cadastro" onclick="trocarTela('cadastro')">Cadastro</button>
</div>

<div class="container">

<!-- TELA HORA EXTRA -->
<div id="hora">

<div class="card">
<input type="number" id="cracha" placeholder="Crachá">
<button onclick="buscar()">Buscar</button>

<div id="listaOperadores" style="margin-top: 15px;"></div>

<div class="row">
    <input type="date" id="dataHE">
    <select id="horarioHE">
        <option value="" disabled selected>Selecione o Horário</option>
        <option value="06h-12h">06h-12h</option>
        <option value="12h-18h">12h-18h</option>
        <option value="18h-00h">18h-00h</option>
        <option value="00h-06h">00h-06h</option>
    </select>
</div>

<input type="text" id="lider" placeholder="Nome do líder">

<button onclick="enviar()">Confirmar Hora Extra</button>
</div>

</div>

<!-- TELA CADASTRO -->
<div id="cadastro" style="display:none;">

<div class="card">
<input type="text" id="nomeCad" placeholder="Nome">
<input type="text" id="crachaCad" placeholder="Crachá">
<input type="text" id="enderecoCad" placeholder="Endereço">
<input type="text" id="setorCad" placeholder="Setor">
<input type="text" id="turnoCad" placeholder="Turno">

<button onclick="cadastrar()">Cadastrar Funcionário</button>
</div>

</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzt1F9ybfU4YP3ZjvXOPQ_pycYVf8HAEjhsZ1ME68d-o5cjThJIUr8ydAZJVaL2jgg/exec";

let colaboradoresSelecionados = [];

// TROCAR TELA
function trocarTela(tela) {
    document.getElementById("hora").style.display = tela === "hora" ? "block" : "none";
    document.getElementById("cadastro").style.display = tela === "cadastro" ? "block" : "none";
    
    // Atualiza a classe active nos botões
    if (tela === 'hora') {
        document.getElementById("btn-hora").classList.add("active");
        document.getElementById("btn-cadastro").classList.remove("active");
    } else {
        document.getElementById("btn-hora").classList.remove("active");
        document.getElementById("btn-cadastro").classList.add("active");
    }
}

// BUSCAR
function buscar() {
    let cracha = document.getElementById("cracha").value;
    if (!cracha) return;

    fetch(URL + "?cracha=" + cracha)
    .then(res => {
        if (!res.ok) throw new Error("Status: " + res.status);
        return res.json();
    })
    .then(data => {
        if (data.nome) {
            adicionarNaLista(data, cracha); // Passa o objeto completo 'data'
            document.getElementById("cracha").value = "";
        } else {
            alert("❌ Funcionário não encontrado");
        }
    })
    .catch((error) => {
        console.error("Erro na busca:", error);
        alert("❌ Erro ao buscar funcionário. O serviço pode estar indisponível ou a cota do Google Scripts excedida.");
    });
}

function adicionarNaLista(data, cracha) {
    // Evita duplicados
    if (colaboradoresSelecionados.some(c => c.cracha === cracha)) {
        alert("⚠️ Funcionário já está na lista");
        return;
    }

    const lista = document.getElementById("listaOperadores");
    const item = document.createElement("div");
    item.className = "operator-item selected"; // Começa com a classe selected
    item.id = "item-" + cracha;
    
    // Exibe os detalhes completos (nome, setor, turno, endereco)
    item.innerHTML = `
        <input type="checkbox" checked onchange="toggleColaborador('${cracha}', this.checked, this)">
        <div class="operator-info">
            <span>👤 ${data.nome} (${cracha})</span>
            <small>Setor: ${data.setor || '-'} | Turno: ${data.turno || '-'}</small>
            <small>📍 ${data.endereco || '-'}</small>
        </div>
    `;
    
    lista.appendChild(item);
    // Armazena todos os detalhes no array
    colaboradoresSelecionados.push({ 
        nome: data.nome, 
        cracha: cracha, 
        endereco: data.endereco,
        setor: data.setor,
        turno: data.turno,
        selecionado: true 
    });
}

function toggleColaborador(cracha, selecionado, elemento) {
    const index = colaboradoresSelecionados.findIndex(c => c.cracha === cracha);
    if (index !== -1) {
        colaboradoresSelecionados[index].selecionado = selecionado;
        
        // Adiciona ou remove a classe de destaque visual (selected) no card pai
        const card = elemento.parentElement;
        if (selecionado) {
            card.classList.add("selected");
        } else {
            card.classList.remove("selected");
        }
    }
}

// ENVIAR HORA EXTRA
function enviar() {
    const lider = document.getElementById("lider").value;
    const dataHE = document.getElementById("dataHE").value;
    const horarioHE = document.getElementById("horarioHE").value;
    const selecionados = colaboradoresSelecionados.filter(c => c.selecionado);

    if (selecionados.length === 0) {
        alert("⚠️ Selecione pelo menos um funcionário");
        return;
    }
    if (!dataHE) {
        alert("⚠️ Selecione a data");
        return;
    }
    if (!horarioHE) {
        alert("⚠️ Selecione o horário");
        return;
    }
    if (!lider) {
        alert("⚠️ Digite o nome do líder");
        return;
    }

    const promises = selecionados.map(colab => {
        // Formatar data de YYYY-MM-DD para DD/MM/YYYY
        let dataFormatada = "";
        if (dataHE) {
            const partes = dataHE.split("-");
            dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        return fetch(URL, {
            method: "POST",
            body: JSON.stringify({
                tipo: "hora_extra",
                cracha: colab.cracha,
                nome: colab.nome,
                endereco: colab.endereco,
                setor: colab.setor,
                turno: colab.turno,
                data: dataFormatada, // Envia a data selecionada formatada
                horario: horarioHE,   // Envia o horário selecionado (ex: 12h-18h)
                lider: lider
            })
        }).then(res => {
            if (!res.ok) throw new Error("Status: " + res.status);
            return res;
        });
    });

    Promise.all(promises)
    .then(() => {
        alert("✅ Hora extra enviada para todos os selecionados");
        document.getElementById("listaOperadores").innerHTML = "";
        colaboradoresSelecionados = [];
        document.getElementById("lider").value = "";
        document.getElementById("dataHE").value = "";
        document.getElementById("horarioHE").value = "";
    })
    .catch((error) => {
        console.error("Erro no envio:", error);
        alert("❌ Erro ao enviar algumas horas extras. O serviço (Google Scripts) pode estar temporariamente fora do ar.");
    });
}

// CADASTRAR FUNCIONÁRIO
function cadastrar() {
    fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            tipo: "cadastro",
            nome: document.getElementById("nomeCad").value,
            cracha: document.getElementById("crachaCad").value,
            endereco: document.getElementById("enderecoCad").value,
            setor: document.getElementById("setorCad").value,
            turno: document.getElementById("turnoCad").value
        })
    })
    .then(() => alert("✅ Funcionário cadastrado"))
    .catch(() => alert("❌ Erro"));
}

</script>

</body>
</html>
