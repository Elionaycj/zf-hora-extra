<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZF Hora Extra</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial; margin: 0; background: #f4f6f9; }
.header { background: #0057B8; color: white; padding: 15px; text-align: center; font-size: 20px; }
.tabs { display: flex; background: white; }
.tabs button { flex: 1; padding: 12px; border: none; background: #ddd; font-weight: bold; cursor: pointer; }
.tabs button.active { background: #0057B8; color: white; }
.container { padding: 20px; }
input, button, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
button { background: #0057B8; color: white; border: none; transition: transform 0.1s ease, background 0.2s ease; cursor: pointer; }
button:active { transform: scale(0.96); background: #004494; }
button:disabled { background: #999; cursor: not-allowed; transform: none; }
.card { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; }
.operator-item { display: flex; align-items: flex-start; background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; transition: all 0.3s ease; border-left: 5px solid #ccc; }
.operator-item.selected { background: #e7f3ff; border-left: 5px solid #0057B8; transform: translateX(5px); }
.operator-item input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; margin-top: 2px; cursor: pointer; flex-shrink: 0; }
.operator-info { display: flex; flex-direction: column; gap: 2px; }
.operator-info span { font-size: 14px; font-weight: bold; color: #333; }
.operator-info small { font-size: 12px; color: #666; }
.leader-select-box { width: 100%; padding: 12px; margin-top: 10px; background: white; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; font-weight: bold; color: #333; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.leader-select-box::after { content: "▼"; font-size: 10px; color: #666; }
.leader-select-box.open::after { content: "▲"; }
.leader-carousel { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-top: 5px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
.leader-carousel::-webkit-scrollbar { display: none; }
.leader-carousel.hidden { display: none; }
.leader-item { flex: 0 0 auto; padding: 10px 15px; background: #eee; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; }
.leader-item.active { background: #0057B8; color: white; border-color: #004494; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
#login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f4f6f9; }
.login-card { background: white; padding: 30px; border-radius: 12px; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.login-card h2 { color: #0057B8; text-align: center; margin-bottom: 5px; }
.login-card p { text-align: center; font-size: 12px; color: #888; margin-bottom: 5px; }
.perfil-badge { display: inline-block; background: #e7f3ff; color: #0057B8; font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 12px; margin-left: 8px; vertical-align: middle; }
.header-inner { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
.btn-logout { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: white; width: auto; padding: 5px 12px; font-size: 12px; margin-top: 0; border-radius: 20px; }
.btn-logout:hover { background: rgba(255,255,255,0.35); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>🏭 ZF Hora Extra</h2>
    <p>Acesso restrito — use suas credenciais</p>
    <input type="email" id="email-login" placeholder="E-mail" autocomplete="email">
    <input type="password" id="senha-login" placeholder="Senha" onkeydown="if(event.key==='Enter') fazerLogin()">
    <button onclick="fazerLogin()" id="btn-login">Entrar</button>
  </div>
</div>

<div id="main-content" style="display:none;">
<div class="header">
  <div class="header-inner">
    <span>ZF Hora Extra</span>
    <span id="badge-perfil" class="perfil-badge" style="display:none;"></span>
    <button class="btn-logout" onclick="fazerLogout()">Sair</button>
  </div>
</div>
<div class="tabs">
  <button id="btn-hora" class="active" onclick="trocarTela('hora')">Hora Extra</button>
  <button id="btn-cadastro" onclick="trocarTela('cadastro')">Cadastro</button>
</div>
<div class="container">
  <p style="font-size:10px;color:#666;text-align:center;margin-top:10px;">
    Dados protegidos conforme a LGPD. O processamento limita-se ao necessário para o controle de jornada.
  </p>

  <div id="hora">
    <div class="card">
      <div class="row">
        <input type="number" id="cracha" placeholder="Crachá" onkeydown="if(event.key==='Enter') buscar()">
        <button onclick="buscar()" id="btn-buscar" style="margin-top:10px;">Buscar</button>
      </div>
      <div id="listaOperadores" style="margin-top:15px;"></div>
      <div id="leader-trigger" class="leader-select-box" onclick="ui.toggleLeaderSelector()">
        <span id="selected-leader-name">Selecionar Líder</span>
      </div>
      <div id="leader-carousel" class="leader-carousel hidden"></div>
      <div class="row">
        <input type="date" id="dataHE">
        <select id="horarioHE">
          <option value="" disabled selected>Selecione o Horário</option>
          <option value="06h-12h">06h-12h</option>
          <option value="12h-18h">12h-18h</option>
          <option value="18h-00h">18h-00h</option>
          <option value="00h-06h">00h-06h</option>
        </select>
      </div>
      <button onclick="enviar()" id="btn-enviar">Confirmar Hora Extra</button>
    </div>
  </div>

  <div id="cadastro" style="display:none;">
    <div class="card">
      <input type="text"   id="nomeCad"     placeholder="Nome">
      <input type="number" id="crachaCad"   placeholder="Crachá">
      <input type="text"   id="enderecoCad" placeholder="Endereço">
      <input type="text"   id="setorCad"    placeholder="Setor">
      <input type="text"   id="turnoCad"    placeholder="Turno">
      <button onclick="cadastrar()" id="btn-cadastrar">Cadastrar Funcionário</button>
    </div>
  </div>
</div>
</div>

<script>
// ⚠️ URL DO SEU WEB APP (Google Apps Script)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxasc_XR86ySCdYvyecVM1f8vPSzPaMWSTvHIXDVDGpbm-H9bfUWaaYTvis94xfXbY/exec";

const LISTA_LIDERES = ["Willian Nunes", "Cidão Aparecido", "Claudecir", "Wili", "Altair", "Roseli"];

// Sessão em memória (some ao fechar a aba — seguro)
let sessao = { token: null, email: null, perfil: null };
let colaboradoresSelecionados = [];
let liderSelecionado = "";

// ── Comunicação com Apps Script ──────────────────────
async function chamarScript(params) {
  if (sessao.token && !params.token) params.token = sessao.token;
  const qs = new URLSearchParams(params).toString();
  const r  = await fetch(`${SCRIPT_URL}?${qs}`);
  return r.json();
}

// ── LOGIN via Apps Script ────────────────────────────
window.fazerLogin = async function() {
  const email = document.getElementById("email-login").value.trim();
  const senha = document.getElementById("senha-login").value;
  const btn   = document.getElementById("btn-login");
  if (!email || !senha) { alert("⚠️ Preencha e-mail e senha"); return; }

  btn.innerHTML = '<span class="spinner"></span>Entrando...';
  btn.disabled = true;

  try {
    // sem token ainda — rota de login é pública no Apps Script
    const data = await chamarScript({ acao: "login", email, senha });

    if (data.erro) {
      btn.textContent = "❌ " + data.erro;
      setTimeout(() => { btn.textContent = "Entrar"; btn.disabled = false; }, 2500);
      return;
    }

    sessao = { token: data.token, email, perfil: data.perfil };

    const badge = document.getElementById("badge-perfil");
    badge.textContent = data.perfil === "gestor" ? "👑 Gestor" : "👷 Líder";
    badge.style.display = "inline-block";

    // Cadastro visível só para gestor
    document.getElementById("btn-cadastro").style.display =
      data.perfil === "gestor" ? "" : "none";

    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-content").style.display = "block";

  } catch (e) {
    btn.textContent = "❌ Erro de conexão";
    setTimeout(() => { btn.textContent = "Entrar"; btn.disabled = false; }, 2500);
    console.error(e);
  }
};

// ── LOGOUT ───────────────────────────────────────────
window.fazerLogout = function() {
  sessao = { token: null, email: null, perfil: null };
  colaboradoresSelecionados = [];
  liderSelecionado = "";
  document.getElementById("listaOperadores").innerHTML = "";
  document.getElementById("main-content").style.display = "none";
  document.getElementById("login-screen").style.display  = "flex";
  document.getElementById("email-login").value = "";
  document.getElementById("senha-login").value = "";
  const btn = document.getElementById("btn-login");
  btn.textContent = "Entrar"; btn.disabled = false;
  document.getElementById("btn-cadastro").style.display = "";
};

// Redireciona para login se o token expirar no servidor
function checarNaoAutorizado(data) {
  if (data.erro === "Não autorizado") { fazerLogout(); return true; }
  return false;
}

// ── CAROUSEL DE LÍDERES ──────────────────────────────
const ui = {
  toggleLeaderSelector() {
    document.getElementById("leader-carousel").classList.toggle("hidden");
    document.getElementById("leader-trigger").classList.toggle("open");
  },
  selectLeader(nome, el) {
    document.querySelectorAll(".leader-item").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
    liderSelecionado = nome;
    document.getElementById("selected-leader-name").textContent = "Líder: " + nome;
    this.toggleLeaderSelector();
  }
};

window.onload = function() {
  const carousel = document.getElementById("leader-carousel");
  LISTA_LIDERES.forEach(nome => {
    const item = document.createElement("div");
    item.className = "leader-item";
    item.textContent = nome;
    item.onclick = () => ui.selectLeader(nome, item);
    carousel.appendChild(item);
  });
};

// ── ABAS ─────────────────────────────────────────────
window.trocarTela = function(tela) {
  document.getElementById("hora").style.display     = tela === "hora"     ? "block" : "none";
  document.getElementById("cadastro").style.display = tela === "cadastro" ? "block" : "none";
  document.getElementById("btn-hora").className     = tela === "hora"     ? "active" : "";
  document.getElementById("btn-cadastro").className = tela === "cadastro" ? "active" : "";
};

// ── BUSCAR FUNCIONÁRIO ───────────────────────────────
window.buscar = async function() {
  const cracha = document.getElementById("cracha").value.trim();
  if (!cracha) { alert("⚠️ Digite um crachá"); return; }
  const btn = document.getElementById("btn-buscar");
  btn.innerHTML = '<span class="spinner"></span>Buscando...';
  btn.disabled = true;
  try {
    const data = await chamarScript({ acao: "buscar", cracha });
    if (checarNaoAutorizado(data)) return;
    if (data.erro) { alert("❌ " + data.erro); return; }
    adicionarNaLista(data, cracha);
    document.getElementById("cracha").value = "";
  } catch (e) { alert("❌ Erro de conexão."); console.error(e); }
  finally { btn.innerHTML = "Buscar"; btn.disabled = false; }
};

function adicionarNaLista(data, cracha) {
  if (colaboradoresSelecionados.some(c => c.cracha === cracha)) {
    alert("⚠️ Funcionário já está na lista"); return;
  }
  const lista = document.getElementById("listaOperadores");
  const item  = document.createElement("div");
  item.className = "operator-item selected";
  item.id = "item-" + cracha;
  item.innerHTML = `
    <input type="checkbox" checked onchange="toggleColaborador('${cracha}', this.checked, this)">
    <div class="operator-info">
      <span>👤 ${data.nome} (${cracha})</span>
      <small>Setor: ${data.setor} | Turno: ${data.turno}</small>
    </div>`;
  lista.appendChild(item);
  colaboradoresSelecionados.push({ nome: data.nome, cracha, setor: data.setor, turno: data.turno, selecionado: true });
}

window.toggleColaborador = function(cracha, selecionado, el) {
  const i = colaboradoresSelecionados.findIndex(c => c.cracha === cracha);
  if (i !== -1) { colaboradoresSelecionados[i].selecionado = selecionado; el.parentElement.classList.toggle("selected", selecionado); }
};

// ── ENVIAR HORA EXTRA ────────────────────────────────
window.enviar = async function() {
  const lider     = liderSelecionado;
  const dataHE    = document.getElementById("dataHE").value;
  const horarioHE = document.getElementById("horarioHE").value;
  const selecionados = colaboradoresSelecionados.filter(c => c.selecionado);
  if (!selecionados.length) { alert("⚠️ Selecione ao menos um funcionário"); return; }
  if (!dataHE)              { alert("⚠️ Selecione a data");                  return; }
  if (!horarioHE)           { alert("⚠️ Selecione o horário");               return; }
  if (!lider)               { alert("⚠️ Selecione o líder");                 return; }
  const btn = document.getElementById("btn-enviar");
  btn.innerHTML = '<span class="spinner"></span>Enviando...';
  btn.disabled = true;
  let erros = 0;
  for (const colab of selecionados) {
    try {
      const data = await chamarScript({ acao: "hora_extra", cracha: colab.cracha, nome: colab.nome, setor: colab.setor, turno: colab.turno, lider, data: dataHE, horario: horarioHE });
      if (checarNaoAutorizado(data)) return;
      if (data.erro) erros++;
    } catch { erros++; }
  }
  btn.innerHTML = "Confirmar Hora Extra"; btn.disabled = false;
  if (erros === 0) {
    alert(`✅ Hora extra registrada para ${selecionados.length} funcionário(s)`);
    document.getElementById("listaOperadores").innerHTML = "";
    colaboradoresSelecionados = [];
    liderSelecionado = "";
    document.getElementById("selected-leader-name").textContent = "Selecionar Líder";
    document.querySelectorAll(".leader-item").forEach(i => i.classList.remove("active"));
    document.getElementById("dataHE").value = "";
    document.getElementById("horarioHE").selectedIndex = 0;
  } else { alert(`⚠️ ${erros} registro(s) falharam.`); }
};

// ── CADASTRAR FUNCIONÁRIO ────────────────────────────
window.cadastrar = async function() {
  const nome     = document.getElementById("nomeCad").value.trim();
  const cracha   = document.getElementById("crachaCad").value.trim();
  const endereco = document.getElementById("enderecoCad").value.trim();
  const setor    = document.getElementById("setorCad").value.trim();
  const turno    = document.getElementById("turnoCad").value.trim();
  if (!nome || !cracha || !setor || !turno) { alert("⚠️ Preencha nome, crachá, setor e turno"); return; }
  const btn = document.getElementById("btn-cadastrar");
  btn.innerHTML = '<span class="spinner"></span>Cadastrando...';
  btn.disabled = true;
  try {
    const data = await chamarScript({ acao: "cadastro", nome, cracha, endereco, setor, turno });
    if (checarNaoAutorizado(data)) return;
    if (data.sucesso) {
      alert("✅ Funcionário cadastrado com sucesso");
      ["nomeCad","crachaCad","enderecoCad","setorCad","turnoCad"].forEach(id => document.getElementById(id).value = "");
    } else { alert("❌ " + (data.erro || "Erro desconhecido")); }
  } catch (e) { alert("❌ Erro de conexão."); console.error(e); }
  finally { btn.innerHTML = "Cadastrar Funcionário"; btn.disabled = false; }
};
</script>
</body>
</html>
