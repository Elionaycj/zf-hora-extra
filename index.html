<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZF Hora Extra</title>

<style>
/* ... Mantendo todos os seus estilos originais ... */
body { font-family: Arial; margin: 0; background: #f4f6f9; }
.header { background: #0057B8; color: white; padding: 15px; text-align: center; font-size: 20px; }
.tabs { display: flex; background: white; }
.tabs button { flex: 1; padding: 12px; border: none; background: #ddd; font-weight: bold; }
.tabs button.active { background: #0057B8; color: white; }
.container { padding: 20px; }
input, button, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
button { background: #0057B8; color: white; border: none; transition: transform 0.1s ease, background 0.2s ease; cursor: pointer; }
button:active { transform: scale(0.96); background: #004494; }
.card { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; }
.operator-item { display: flex; align-items: flex-start; background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; transition: all 0.3s ease; border-left: 5px solid #ccc; }
.operator-item.selected { background: #e7f3ff; border-left: 5px solid #0057B8; transform: translateX(5px); }
.operator-item input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; margin-top: 2px; cursor: pointer; transition: transform 0.2s ease; }
.operator-item input[type="checkbox"]:checked { transform: scale(1.2); }
.operator-info { display: flex; flex-direction: column; gap: 2px; }
.operator-info span { font-size: 14px; font-weight: bold; color: #333; }
.operator-info small { font-size: 12px; color: #666; }
</style>
</head>

<body>

<div class="header">ZF Hora Extra</div>

<div class="tabs">
    <button id="btn-hora" class="active" onclick="trocarTela('hora')">Hora Extra</button>
    <button id="btn-cadastro" onclick="trocarTela('cadastro')">Cadastro</button>
</div>

<div class="container" id="main-content">
    
<p style="font-size: 10px; color: #666; text-align: center; margin-top: 20px;">
    Dados protegidos conforme a LGPD. O processamento limita-se ao necessário para o controle de jornada.
</p>

<div id="hora">
<div class="card">
<input type="number" id="cracha" placeholder="Crachá">
<button onclick="buscar()">Buscar</button>
<div id="listaOperadores" style="margin-top: 15px;"></div>
<div class="row">
    <input type="date" id="dataHE">
    <select id="horarioHE">
        <option value="" disabled selected>Selecione o Horário</option>
        <option value="06h-12h">06h-12h</option>
        <option value="12h-18h">12h-18h</option>
        <option value="18h-00h">18h-00h</option>
        <option value="00h-06h">00h-06h</option>
    </select>
</div>
<input type="text" id="lider" placeholder="Nome do líder">
<button onclick="enviar()">Confirmar Hora Extra</button>
</div>
</div>

<div id="cadastro" style="display:none;">
<div class="card">
<input type="text" id="nomeCad" placeholder="Nome">
<input type="text" id="crachaCad" placeholder="Crachá">
<input type="text" id="enderecoCad" placeholder="Endereço">
<input type="text" id="setorCad" placeholder="Setor">
<input type="text" id="turnoCad" placeholder="Turno">
<button onclick="cadastrar()">Cadastrar Funcionário</button>
</div>
</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzt1F9ybfU4YP3ZjvXOPQ_pycYVf8HAEjhsZ1ME68d-o5cjThJIUr8ydAZJVaL2jgg/exec";
const SECURITY_TOKEN = "2503"; // Deve ser igual ao definido no Apps Script

let colaboradoresSelecionados = [];

function trocarTela(tela) {
    document.getElementById("hora").style.display = tela === "hora" ? "block" : "none";
    document.getElementById("cadastro").style.display = tela === "cadastro" ? "block" : "none";
    document.getElementById("btn-hora").classList.toggle("active", tela === 'hora');
    document.getElementById("btn-cadastro").classList.toggle("active", tela === 'cadastro');
}

function buscar() {
    let cracha = document.getElementById("cracha").value;
    if (!cracha) return;

    // SEGURANÇA: Inclusão do token na requisição
    fetch(`${URL}?cracha=${cracha}&token=${SECURITY_TOKEN}`)
    .then(res => res.json())
    .then(data => {
        if (data.nome) {
            adicionarNaLista(data, cracha);
            document.getElementById("cracha").value = "";
        } else {
            alert("❌ Funcionário não encontrado");
        }
    })
    .catch(() => alert("❌ Erro na comunicação segura."));
}

function adicionarNaLista(data, cracha) {
    if (colaboradoresSelecionados.some(c => c.cracha === cracha)) {
        alert("⚠️ Funcionário já está na lista");
        return;
    }

    const lista = document.getElementById("listaOperadores");
    const item = document.createElement("div");
    item.className = "operator-item selected";
    item.id = "item-" + cracha;
    
    // MINIMIZAÇÃO: Endereço não é exibido visualmente na lista por privacidade
    item.innerHTML = `
        <input type="checkbox" checked onchange="toggleColaborador('${cracha}', this.checked, this)">
        <div class="operator-info">
            <span>👤 ${data.nome} (${cracha})</span>
            <small>Setor: ${data.setor || '-'} | Turno: ${data.turno || '-'}</small>
        </div>
    `;
    
    lista.appendChild(item);
    colaboradoresSelecionados.push({ 
        nome: data.nome, 
        cracha: cracha, 
        setor: data.setor,
        turno: data.turno,
        selecionado: true 
    });
}

function toggleColaborador(cracha, selecionado, elemento) {
    const index = colaboradoresSelecionados.findIndex(c => c.cracha === cracha);
    if (index !== -1) {
        colaboradoresSelecionados[index].selecionado = selecionado;
        elemento.parentElement.classList.toggle("selected", selecionado);
    }
}

function enviar() {
    const lider = document.getElementById("lider").value;
    const dataHE = document.getElementById("dataHE").value;
    const horarioHE = document.getElementById("horarioHE").value;
    const selecionados = colaboradoresSelecionados.filter(c => c.selecionado);

    if (!selecionados.length || !dataHE || !horarioHE || !lider) {
        alert("⚠️ Preencha todos os campos corretamente.");
        return;
    }

    const promises = selecionados.map(colab => {
        const partes = dataHE.split("-");
        const dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;

        return fetch(URL, {
            method: "POST",
            body: JSON.stringify({
                token: SECURITY_TOKEN, // SEGURANÇA: Token no POST
                tipo: "hora_extra",
                cracha: colab.cracha,
                nome: colab.nome,
                setor: colab.setor,
                turno: colab.turno,
                data: dataFormatada,
                horario: horarioHE,
                lider: lider
            })
        });
    });

    Promise.all(promises)
    .then(() => {
        alert("✅ Hora extra enviada com sucesso");
        document.getElementById("listaOperadores").innerHTML = "";
        colaboradoresSelecionados = [];
        ["lider", "dataHE", "horarioHE"].forEach(id => document.getElementById(id).value = "");
    })
    .catch(() => alert("❌ Erro no envio seguro."));
}

function cadastrar() {
    fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            token: SECURITY_TOKEN, // SEGURANÇA: Token no cadastro
            tipo: "cadastro",
            nome: document.getElementById("nomeCad").value,
            cracha: document.getElementById("crachaCad").value,
            endereco: document.getElementById("enderecoCad").value,
            setor: document.getElementById("setorCad").value,
            turno: document.getElementById("turnoCad").value
        })
    })
    .then(() => {
        alert("✅ Funcionário cadastrado");
        ["nomeCad", "crachaCad", "enderecoCad", "setorCad", "turnoCad"].forEach(id => document.getElementById(id).value = "");
    })
    .catch(() => alert("❌ Erro no cadastro."));
}
</script>
</body>
</html>
