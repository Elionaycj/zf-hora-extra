<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZF Hora Extra</title>
<style>
body { font-family: Arial; margin: 0; background: #f4f6f9; }
.header { background: #0057B8; color: white; padding: 15px; text-align: center; font-size: 20px; }
.tabs { display: flex; background: white; }
.tabs button { flex: 1; padding: 12px; border: none; background: #ddd; font-weight: bold; cursor: pointer; }
.tabs button.active { background: #0057B8; color: white; }
.container { padding: 20px; }
input, button, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
button { background: #0057B8; color: white; border: none; transition: transform 0.1s ease, background 0.2s ease; cursor: pointer; }
button:active { transform: scale(0.96); background: #004494; }
button:disabled { background: #999; cursor: not-allowed; transform: none; }
.card { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; }
.operator-item { display: flex; align-items: flex-start; background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; transition: all 0.3s ease; border-left: 5px solid #ccc; }
.operator-item.selected { background: #e7f3ff; border-left: 5px solid #0057B8; transform: translateX(5px); }
.operator-item input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; margin-top: 2px; cursor: pointer; flex-shrink: 0; }
.operator-info { display: flex; flex-direction: column; gap: 2px; }
.operator-info span { font-size: 14px; font-weight: bold; color: #333; }
.operator-info small { font-size: 12px; color: #666; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Login */
#login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f6f9; }
.login-card { background: white; padding: 30px; border-radius: 12px; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.login-card h2 { color: #0057B8; text-align: center; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h2>🔐 ZF Hora Extra</h2>
    <input type="email" id="email-login" placeholder="E-mail">
    <input type="password" id="senha-login" placeholder="Senha" onkeydown="if(event.key==='Enter') fazerLogin()">
    <button onclick="fazerLogin()" id="btn-login">Entrar</button>
  </div>
</div>

<!-- CONTEÚDO PRINCIPAL (oculto até login) -->
<div id="main-content" style="display:none;">

<div class="header">ZF Hora Extra</div>
<div class="tabs">
  <button id="btn-hora" class="active" onclick="trocarTela('hora')">Hora Extra</button>
  <button id="btn-cadastro" onclick="trocarTela('cadastro')">Cadastro</button>
</div>

<div class="container">

  <p style="font-size: 10px; color: #666; text-align: center; margin-top: 10px;">
    Dados protegidos conforme a LGPD. O processamento limita-se ao necessário para o controle de jornada.
  </p>

  <!-- ABA HORA EXTRA -->
  <div id="hora">
    <div class="card">
      <div class="row">
        <input type="number" id="cracha" placeholder="Crachá" onkeydown="if(event.key==='Enter') buscar()">
        <button onclick="buscar()" id="btn-buscar" style="margin-top:10px;">Buscar</button>
      </div>
      <div id="listaOperadores" style="margin-top: 15px;"></div>
      <div class="row">
        <input type="date" id="dataHE">
        <select id="horarioHE">
          <option value="" disabled selected>Selecione o Horário</option>
          <option value="06h-12h">06h-12h</option>
          <option value="12h-18h">12h-18h</option>
          <option value="18h-00h">18h-00h</option>
          <option value="00h-06h">00h-06h</option>
        </select>
      </div>
      <input type="text" id="lider" placeholder="Nome do líder">
      <button onclick="enviar()" id="btn-enviar">Confirmar Hora Extra</button>
    </div>
  </div>

  <!-- ABA CADASTRO -->
  <div id="cadastro" style="display:none;">
    <div class="card">
      <input type="text" id="nomeCad" placeholder="Nome">
      <input type="number" id="crachaCad" placeholder="Crachá">
      <input type="text" id="enderecoCad" placeholder="Endereço">
      <input type="text" id="setorCad" placeholder="Setor">
      <input type="text" id="turnoCad" placeholder="Turno">
      <button onclick="cadastrar()" id="btn-cadastrar">Cadastrar Funcionário</button>
    </div>
  </div>

</div>
</div>

<script>
// ================= CONFIG =================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxasc_XR86ySCdYvyecVM1f8vPSzPaMWSTvHIXDVDGpbm-H9bfUWaaYTvis94xfXbY/exec";
const TOKEN = "2503";

// ================= STATE =================
const state = {
  usuarioLogado: null,
  colaboradores: []
};

// ================= HELPERS =================
const $ = (id) => document.getElementById(id);

const sanitize = (value) => String(value).trim();

const toggleLoading = (btn, text) => {
  btn.innerHTML = `<span class="spinner"></span>${text}`;
  btn.disabled = true;
};

const resetButton = (btn, text) => {
  btn.innerHTML = text;
  btn.disabled = false;
};

const showError = (msg) => alert(`❌ ${msg}`);
const showWarning = (msg) => alert(`⚠️ ${msg}`);
const showSuccess = (msg) => alert(`✅ ${msg}`);

// ================= API =================
async function chamarScript(params) {
  try {
    const qs = new URLSearchParams({ token: TOKEN, ...params }).toString();
    const resp = await fetch(`${SCRIPT_URL}?${qs}`);

    if (!resp.ok) throw new Error("Erro HTTP");

    const data = await resp.json();
    if (!data) throw new Error("Resposta vazia");

    return data;
  } catch (err) {
    console.error("API ERROR:", err);
    throw new Error("Falha na comunicação com servidor");
  }
}

// ================= LOGIN =================
const USUARIOS = {
  "elionay@horaextra.com": "2503"
};

window.fazerLogin = function () {
  const email = sanitize($("email-login").value);
  const senha = $("senha-login").value;
  const btn = $("btn-login");

  if (USUARIOS[email] && USUARIOS[email] === senha) {
    state.usuarioLogado = email;
    $("login-screen").style.display = "none";
    $("main-content").style.display = "block";
  } else {
    btn.textContent = "❌ Login inválido";
    setTimeout(() => (btn.textContent = "Entrar"), 2000);
  }
};

// ================= UI =================
window.trocarTela = function (tela) {
  $("hora").style.display = tela === "hora" ? "block" : "none";
  $("cadastro").style.display = tela === "cadastro" ? "block" : "none";

  $("btn-hora").className = tela === "hora" ? "active" : "";
  $("btn-cadastro").className = tela === "cadastro" ? "active" : "";
};

// ================= BUSCAR =================
window.buscar = async function () {
  const cracha = sanitize($("cracha").value);
  const btn = $("btn-buscar");

  if (!cracha) return showWarning("Digite um crachá");

  if (state.colaboradores.some(c => c.cracha === cracha)) {
    return showWarning("Funcionário já está na lista");
  }

  toggleLoading(btn, "Buscando...");

  try {
    const data = await chamarScript({ acao: "buscar", cracha });

    if (data.erro) return showError(data.erro);

    adicionarNaLista(data, cracha);
    $("cracha").value = "";

  } catch (err) {
    showError(err.message);
  } finally {
    resetButton(btn, "Buscar");
  }
};

// ================= LISTA =================
function adicionarNaLista(data, cracha) {
  const lista = $("listaOperadores");

  const item = document.createElement("div");
  item.className = "operator-item selected";
  item.id = `item-${cracha}`;

  item.innerHTML = `
    <input type="checkbox" checked onchange="toggleColaborador('${cracha}', this.checked, this)">
    <div class="operator-info">
      <span>👤 ${data.nome} (${cracha})</span>
      <small>Setor: ${data.setor} | Turno: ${data.turno}</small>
    </div>
  `;

  lista.appendChild(item);

  state.colaboradores.push({
    nome: data.nome,
    cracha,
    setor: data.setor,
    turno: data.turno,
    selecionado: true
  });
}

// ================= TOGGLE =================
window.toggleColaborador = function (cracha, selecionado, el) {
  const colab = state.colaboradores.find(c => c.cracha === cracha);
  if (!colab) return;

  colab.selecionado = selecionado;
  el.parentElement.classList.toggle("selected", selecionado);
};

// ================= ENVIAR =================
window.enviar = async function () {
  const lider = sanitize($("lider").value);
  const dataHE = $("dataHE").value;
  const horarioHE = $("horarioHE").value;
  const btn = $("btn-enviar");

  const selecionados = state.colaboradores.filter(c => c.selecionado);

  if (!selecionados.length) return showWarning("Selecione ao menos um funcionário");
  if (!dataHE) return showWarning("Selecione a data");
  if (!horarioHE) return showWarning("Selecione o horário");
  if (!lider) return showWarning("Informe o nome do líder");

  toggleLoading(btn, "Enviando...");

  let erros = 0;

  await Promise.all(selecionados.map(async (colab) => {
    try {
      const res = await chamarScript({
        acao: "hora_extra",
        ...colab,
        lider,
        data: dataHE,
        horario: horarioHE
      });

      if (res.erro) erros++;

    } catch {
      erros++;
    }
  }));

  resetButton(btn, "Confirmar Hora Extra");

  if (erros === 0) {
    showSuccess(`Hora extra registrada para ${selecionados.length} funcionário(s)`);

    $("listaOperadores").innerHTML = "";
    state.colaboradores = [];

    ["lider", "dataHE"].forEach(id => $(id).value = "");
    $("horarioHE").selectedIndex = 0;

  } else {
    showWarning(`${erros} registro(s) falharam`);
  }
};

// ================= CADASTRO =================
window.cadastrar = async function () {
  const nome = sanitize($("nomeCad").value);
  const cracha = sanitize($("crachaCad").value);
  const endereco = sanitize($("enderecoCad").value);
  const setor = sanitize($("setorCad").value);
  const turno = sanitize($("turnoCad").value);

  const btn = $("btn-cadastrar");

  if (!nome || !cracha || !setor || !turno) {
    return showWarning("Preencha nome, crachá, setor e turno");
  }

  toggleLoading(btn, "Cadastrando...");

  try {
    const res = await chamarScript({
      acao: "cadastro",
      nome, cracha, endereco, setor, turno
    });

    if (res.sucesso) {
      showSuccess("Funcionário cadastrado");

      ["nomeCad","crachaCad","enderecoCad","setorCad","turnoCad"]
        .forEach(id => $(id).value = "");

    } else {
      showError(res.erro || "Erro desconhecido");
    }

  } catch (err) {
    showError(err.message);
  } finally {
    resetButton(btn, "Cadastrar Funcionário");
  }
};
</script>
</body>
</html>
